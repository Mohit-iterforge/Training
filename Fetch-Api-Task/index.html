<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Data in Table</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>User Data from API</h1>
    <table id="userTable">
        <thead>
            <tr>
                <th>UserID</th>
                <th>Id</th>
                <th>Name</th>
                <th>Completed</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>
    <div id="pagination"></div>
    <script src="index.js"></script>
</body>

</html>
