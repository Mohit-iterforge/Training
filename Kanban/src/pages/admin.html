<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../css/admin.css" />
  </head>

  <body>
    <div class="container">
      <header class="card header">
        <div class="header-top">
          <div>
            <h1>Admin Dashboard</h1>
            <p id="adminWelcomeMessage"></p>
          </div>

          <div class="btn-group">
            <button id="openUserModalButton" class="btn primary">
              Create User
            </button>

            <button id="logoutButton" class="btn outline">
              Logout
            </button>
          </div>
        </div>

        <div class="filters">
          <div>
            <label>Search</label>
            <input
              id="userSearchInput"
              type="text"
              placeholder="Search by name or email"
            />
          </div>

          <div>
            <label>Role</label>
            <select id="roleFilter">
              <option value="">All Roles</option>
              <option value="Admin">Admin</option>
              <option value="User">User</option>
            </select>
          </div>
        </div>
      </header>

      <p id="adminMessage" class="message hidden"></p>

      <section class="card">
        <div class="section-header">
          <h2>Users</h2>
          <span id="userCount" class="badge">0</span>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>User ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
          </table>
        </div>

        <div id="emptyState" class="empty hidden">
          No users found.
        </div>
      </section>
    </div>

    <!-- Modal -->
    <div id="userModalOverlay" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h2 id="userModalTitle">Create User</h2>
            <p>Fill in the user details below.</p>
          </div>
          <button id="closeUserModalButton"></button>
        </div>

        <form id="userForm">
          <input id="userIdInput" type="hidden" />

          <div>
            <label>Name</label>
            <input id="userNameInput" type="text" required />
          </div>

          <div>
            <label>Email</label>
            <input id="userEmailInput" type="email" required />
          </div>

          <div>
            <label>Password</label>
            <input id="userPasswordInput" type="password" required />
          </div>

          <div>
            <label>Role</label>
            <select id="userRoleInput" required>
              <option value="">Select role</option>
              <option value="Admin">Admin</option>
              <option value="User">User</option>
            </select>
          </div>

          <div class="modal-actions">
            <button type="button" id="cancelUserModalButton" class="btn outline">
              Cancel
            </button>

            <button type="submit" class="btn primary">
              Save User
            </button>
          </div>
        </form>
      </div>
    </div>
    
    <script type="module" src="../js/admin.js"></script>
  </body>
</html>
