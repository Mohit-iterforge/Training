<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      <header class="rounded-2xl bg-white p-6 shadow-sm">
        <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
          <div>
            <h1 class="text-3xl font-bold">Kanban Board</h1>
            <p id="boardWelcomeMessage" class="mt-1 text-sm text-slate-600"></p>
          </div>

          <div class="flex flex-wrap gap-3">
            <button
              id="openTaskModalButton"
              type="button"
              class="rounded-xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-800"
            >
              Create Task
            </button>

            <button
              id="logoutButton"
              type="button"
              class="rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50"
            >
              Logout
            </button>
          </div>
        </div>

        <div class="mt-6 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
          <div>
            <label for="projectFilter" class="mb-2 block text-sm font-medium text-slate-700">Project</label>
            <select
              id="projectFilter"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none focus:border-blue-500"
            >
              <option value="">All Projects</option>
            </select>
          </div>

          <div>
            <label for="assignedUserFilter" class="mb-2 block text-sm font-medium text-slate-700">Assigned User</label>
            <select
              id="assignedUserFilter"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none focus:border-blue-500"
            >
              <option value="">All Users</option>
            </select>
          </div>

          <div>
            <label for="statusFilter" class="mb-2 block text-sm font-medium text-slate-700">Status</label>
            <select
              id="statusFilter"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none focus:border-blue-500"
            >
              <option value="">All Statuses</option>
              <option value="todo">To Do</option>
              <option value="inProgress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>

          <div>
            <label for="taskSearchInput" class="mb-2 block text-sm font-medium text-slate-700">Search</label>
            <input
              id="taskSearchInput"
              type="text"
              placeholder="Search by title"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none focus:border-blue-500"
            />
          </div>
        </div>
      </header>

      <p
        id="boardMessage"
        class="mt-4 hidden rounded-xl px-4 py-3 text-sm font-medium"
      ></p>

      <section class="mt-6 grid gap-6 xl:grid-cols-3">
        <article class="rounded-2xl bg-white p-4 shadow-sm">
          <div class="mb-4 flex items-center justify-between">
            <h2 class="text-lg font-bold text-slate-900">To Do</h2>
            <span
              id="todoCount"
              class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-700"
            >
              0
            </span>
          </div>
          <div id="todoColumn" class="space-y-4"></div>
        </article>

        <article class="rounded-2xl bg-white p-4 shadow-sm">
          <div class="mb-4 flex items-center justify-between">
            <h2 class="text-lg font-bold text-slate-900">In Progress</h2>
            <span
              id="inProgressCount"
              class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-700"
            >
              0
            </span>
          </div>
          <div id="inProgressColumn" class="space-y-4"></div>
        </article>

        <article class="rounded-2xl bg-white p-4 shadow-sm">
          <div class="mb-4 flex items-center justify-between">
            <h2 class="text-lg font-bold text-slate-900">Done</h2>
            <span
              id="doneCount"
              class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-700"
            >
              0
            </span>
          </div>
          <div id="doneColumn" class="space-y-4"></div>
        </article>
      </section>
    </div>

    <!-- Task Modal -->
    <div
      id="taskModalOverlay"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/60 px-4 py-6"
    >
      <div class="w-full max-w-2xl rounded-2xl bg-white p-6 shadow-xl">
        <div class="flex items-start justify-between gap-4">
          <div>
            <h2 id="taskModalTitle" class="text-2xl font-bold">Create Task</h2>
            <p class="mt-1 text-sm text-slate-600">Fill in the details below.</p>
          </div>

          <button
            id="closeTaskModalButton"
            type="button"
            class="rounded-lg px-3 py-2 text-slate-500 transition hover:bg-slate-100 hover:text-slate-700"
          >
            ✕
          </button>
        </div>

        <form id="taskForm" class="mt-6 space-y-4">
          <input id="taskIdInput" type="hidden" />

          <div>
            <label for="taskTitleInput" class="mb-2 block text-sm font-medium text-slate-700">Title</label>
            <input
              id="taskTitleInput"
              type="text"
              class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-blue-500"
              placeholder="Enter task title"
              required
            />
          </div>

          <div>
            <label for="taskDescriptionInput" class="mb-2 block text-sm font-medium text-slate-700">Description</label>
            <textarea
              id="taskDescriptionInput"
              rows="4"
              class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-blue-500"
              placeholder="Enter task description"
              required
            ></textarea>
          </div>

          <div class="grid gap-4 md:grid-cols-3">
            <div>
              <label for="taskAssignedToInput" class="mb-2 block text-sm font-medium text-slate-700">Assign To</label>
              <select
                id="taskAssignedToInput"
                class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 outline-none focus:border-blue-500"
                required
              >
                <option value="">Select user</option>
              </select>
            </div>

            <div>
              <label for="taskProjectIdInput" class="mb-2 block text-sm font-medium text-slate-700">Project</label>
              <select
                id="taskProjectIdInput"
                class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 outline-none focus:border-blue-500"
                required
              >
                <option value="">Select project</option>
              </select>
            </div>

            <div>
              <label for="taskStatusInput" class="mb-2 block text-sm font-medium text-slate-700">Status</label>
              <select
                id="taskStatusInput"
                class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 outline-none focus:border-blue-500"
                required
              >
                <option value="todo">To Do</option>
                <option value="inProgress">In Progress</option>
                <option value="done">Done</option>
              </select>
            </div>
          </div>

          <div class="flex flex-col-reverse gap-3 pt-2 sm:flex-row sm:justify-end">
            <button
              id="cancelTaskModalButton"
              type="button"
              class="rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50"
            >
              Cancel
            </button>

            <button
              id="submitTaskButton"
              type="submit"
              class="rounded-xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-800"
            >
              Save Task
            </button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="../js/board.js"></script>
  </body>
</html>
